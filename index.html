<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Festify Web Application">

  <!-- Viewport meta tag for mobile responsiveness -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>
  <link rel="icon" type="image/png" sizes="32x32" href="icons/Icon-192.png"/>
  <link rel="icon" type="image/png" sizes="16x16" href="icons/Icon-192.png"/>
  <link rel="apple-touch-icon" href="icons/Icon-192.png"/>
  <link rel="manifest" href="manifest.json"/>

  <title>Festify Web</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      height: 100%;
      width: 100%;
      position: fixed;
    }
    
    #flutter_target {
      width: 100%;
      height: 100%;
    }
    
    .loader {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 50px;
      height: 50px;
      border: 5px solid #f3f3f3;
      border-top: 5px solid #3498db;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>

  <!-- Script for handling routing for SPA redirects -->
  <script>
    // Redirect script for handling SPA URLs from 404.html
    window.onload = function() {
      // URL redirect handling for go_router
      const queryString = window.location.search;
      const urlParams = new URLSearchParams(queryString);
      
      // Check if this is a redirect from the 404 page
      const path = urlParams.get('/');
      
      if (path) {
        // The URL was redirected from 404.html
        // Reconstruct the original URL and redirect there
        urlParams.delete('/');
        
        const newUrl = window.location.pathname + 
          (path.length > 0 ? path.replace(/~and~/g, '&') : '') +
          (urlParams.toString().length > 0 ? '?' + urlParams.toString().replace(/~and~/g, '&') : '') +
          window.location.hash;
          
        window.history.replaceState(null, null, newUrl);
      }
    };
  </script>
</head>
<body>
  <div id="flutter_target">
    <div class="loader"></div>
  </div>
  
  <script>
    window.addEventListener('load', function() {
      var loading = document.querySelector('.loader');
      _flutter.loader.loadEntrypoint({
        onEntrypointLoaded: function(engineInitializer) {
          engineInitializer.initializeEngine().then(function(appRunner) {
            loading.style.display = 'none';
            appRunner.runApp();
          });
        }
      });
    });
  </script>
  <script src="flutter.js" defer></script>
</body>
</html>
